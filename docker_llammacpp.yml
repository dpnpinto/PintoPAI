# This work with no problem
services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp-server
    ports:
      - "8080:8080"
    volumes:
      # Mount a local 'models' directory to the container
      - ./models:/models
    # Adjust the command based on your model name and desired parameters
    # -m: path to model, -c: context size, --host: listen address, -ngl: number of GPU layers to offload
    command: -m /models/your_model.gguf -c 2048 --host 0.0.0.0 --port 8080 -ngl 99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1  # Number of GPUs to use, or 'all'
              capabilities: [gpu]
    restart: unless-stopped
